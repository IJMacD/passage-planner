{{ if .Values.websockify.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-websockify
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.hostname }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.websockify.gateway.parentRef.name }}
      namespace: {{ .Values.websockify.gateway.parentRef.namespace }}
      sectionName: {{ .Values.websockify.gateway.parentRef.sectionName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.websockify.gateway.path }}
      backendRefs:
        - kind: Service
          name: {{ .Release.Name }}-websockify
          port: 80
          weight: 1
{{ end }}