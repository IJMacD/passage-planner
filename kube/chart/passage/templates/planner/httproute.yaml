{{ if .Values.planner.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ }}
  namespace: {{ }}
spec:
  hostnames:
    - {{ .Values.hostname }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ }}
      namespace: {{ }}
      sectionName: {{ }}
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: {{ }}
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
{{ end }}