hostname: passage.ijmacd.com
mariadb:
  image:
    repository: bitnamilegacy/mariadb
  auth:
    database: passage
    username: passage_user
  initdbScriptsConfigMap: logbook-mariadb-init
  primary:
    resources:
      requests:
        memory: 148Mi
        cpu: 50m
      limits:
        memory: 256Mi
planner:
  replicaCount: 1
  repository:
    image: ijmacd/passage-planner
  gateway:
    enabled: true
    path: "/"
    parentRef:
      name: gateway
      namespace: default
      sectionName: https
  ingress:
    enabled: false
    path: "/"
    tls:
      enabled: false
  local:
    enabled: false
logbook:
  replicaCount: 1
  repository:
    image: ijmacd/logbook
  gateway:
    enabled: true
    path: "/logbook"
    parentRef:
      name: gateway
      namespace: default
      sectionName: https
  ingress:
    enabled: false
    path: "/logbook"
    class: nginx
    tls:
      enabled: false
  local:
    enabled: false
  auth:
    password: ""
websockify:
  enabled: true
  replicaCount: 1
  repository:
    image: efrecon/websockify
  ingress:
    enabled: false
    path: "/wsais"
    tls:
      enabled: false
nmeaRepeater:
  enabled: true
  repository:
    image: ijmacd/nmea-repeater
    tag: 1.0.0
